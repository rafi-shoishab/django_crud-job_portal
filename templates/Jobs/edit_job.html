{% extends 'base.html' %} {% block title %} Edit job - Job Portal {% endblock %}

<!-- Page Container -->
{% block content %}

  <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-600"> Update Job</h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}

      <!-- Job Title -->
      <div>
        <label class="block font-medium mb-1">Job Title</label>
        <input type="text" name="title" value="{{ job.job_title }}" placeholder="Enter Job Title. . ." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Company Name -->
      <div>
        <label class="block font-medium mb-1">Company Name</label>
        <input type="text" name="company_name" value="{{ job.company_name }}" placeholder="Enter Company Name. . ." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Company Logo -->
      <div>
        <label class="block font-medium mb-1">Company Logo</label>
        <input type="file" name="company_logo" class="w-full border rounded-lg px-4 py-2 bg-white" />
      </div>

      <!-- Job Location -->
      <div>
        <label class="block font-medium mb-1">Job Location</label>
        <input type="text" name="location" value="{{ job.job_location }}" placeholder="Enter Job Location. . ." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Job Type -->
      <div>
        <label class="block font-medium mb-1">Job Type</label>
        <select name="type" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
          <option value="">Select Type</option>
          
          <option value="remote"
          {% if job.job_type == "remote" %} 
          selected
          {% endif %}
          >Remote</option>

          <option value="on-Site"
          {% if job.job_type == "on-site" %}
          selected
          {% endif %}
          >On-Site</option>

          <option value="hybrid"
          {% if job.job_type == "hybrid" %}
          selected
          {% endif %}
          >Hybrid</option>
        </select>
      </div>

      <!-- Vacancy -->
      <div>
        <label class="block font-medium mb-1">Vacancy</label>
        <input type="number" name="openings" value="{{ job.vacancy }}" placeholder="No. of Job Openings. . ." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Job Catagory -->
      <div>
        <label class="block font-medium mb-1">Category</label>
        <select name="category" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
          
          <option value="">Select Category</option>
          
          <option value="full time"
          {% if job.category == "full time" %} 
          selected 
          {% endif %}
          >Full Time</option>

          <option value="part time"
          {% if job.category == "part time" %} 
          selected 
          {% endif %}
          >Part Time</option>

          <option value="intern"
          {% if job.category == "intern" %} 
          selected 
          {% endif %}
          >Internship</option>

          <option value="contract"
          {% if job.category == "contract" %} 
          selected 
          {% endif %}
          >Contractual</option>
        </select>
      </div>

      <!-- Job Description -->
      <div>
        <label class="block font-medium mb-1">Job Description</label>
        <textarea name="description" rows="4"
        laceholder="Write job responsibilities and requirements . . ." 
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
        {{ job.job_description }}
        </textarea>
      </div>

      <!-- Skills -->
      <div>
        <label class="block font-medium mb-1">Skills</label>
        <input type="text" name="skill" value="{{ job.skills }}" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. React, Django, SQL. . ." />
      </div>

      <!-- Salary -->
      <div>
        <label class="block font-medium mb-1">Salary</label>
        <input type="text" name="salary" value="{{ job.salary }}" placeholder="Enter Salary" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

    <!-- Submission Deadline -->
    <div>
      <label class="block font-medium mb-1">Submission Deadline</label>
      <input
        type="date"
        name="deadline"
        value="{{ job.deadline }}"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Submit Button -->
    <div class="text-center">
      <button
        type="submit"
        class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700"
      >
        Update Job
      </button>
    </div>
  </form>
</div>
{% endblock %}

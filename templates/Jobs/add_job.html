{% extends 'base.html' %} 
{% block title %} 
Add Job - Job Portal 
{% endblock %}

<!-- Page Container -->
{% block content %}
<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">
  <h2 class="text-3xl font-bold mb-6 text-center text-blue-600">Add New Job</h2>

  <form method="POST" enctype="multipart/form-data" class="space-y-5">
    {% csrf_token %}

    <!-- Job Title -->
    <div>
      <label class="block font-medium mb-1">Job Title</label>
      <input
        type="text"
        name="title"
        placeholder="Enter Job Title. . ."
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Company Name -->
    <div>
      <label class="block font-medium mb-1">Company Name</label>
      <input
        type="text"
        name="company_name"
        placeholder="Enter Company Name. . ."
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Company Logo -->
    <div>
      <label class="block font-medium mb-1">Company Logo</label>
      <input
        type="file"
        name="company_logo"
        class="w-full border rounded-lg px-4 py-2 bg-white"
      />
    </div>

    <!-- Job Location -->
    <div>
      <label class="block font-medium mb-1">Job Location</label>
      <input
        type="text"
        name="location"
        placeholder="Enter Job Location. . ."
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Job Type -->
    <div>
      <label class="block font-medium mb-1">Job Type</label>
      <select
        name="type"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      >
        <option value="">Select Type</option>
        <option value="remote">Remote</option>
        <option value="onsite">On-Site</option>
        <option value="hybrid">Hybrid</option>
      </select>
    </div>

    <!-- Vacancy -->
    <div>
      <label class="block font-medium mb-1">Vacancy</label>
      <input
        type="number"
        name="openings"
        placeholder="No. of Job Openings. . ."
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Job Catagory -->
    <div>
      <label class="block font-medium mb-1">Category</label>
      <select
        name="category"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      >
        <option value="">Select Category</option>
        <option value="full time">Full Time</option>
        <option value="part time">Part Time</option>
        <option value="intern">Internship</option>
        <option value="contract">Contractual</option>
      </select>
    </div>

    <!-- Job Description -->
    <div>
      <label class="block font-medium mb-1">Job Description</label>
      <textarea
        name="description"
        rows="4"
        placeholder="Job Description. . ."
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      ></textarea>
    </div>

    <!-- Skills -->
    <div>
      <label class="block font-medium mb-1">Skills</label>
      <input
        type="text"
        name="skill"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="e.g. React, Django, SQL. . ."
      />
    </div>

    <!-- Salary -->
    <div>
      <label class="block font-medium mb-1">Salary</label>
      <input
        type="text"
        name="salary"
        placeholder="Enter Salary"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Deadline -->
    <div>
      <label class="blskillock font-medium mb-1">Submission Deadline</label>
      <input
        type="date"
        name="deadline"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="text-center">
      <button
        type="submit"
        class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700"
      >
        Add Job
      </button>
    </div>
  </form>
</div>
{% endblock %}

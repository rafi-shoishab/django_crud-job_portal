{% extends 'base.html' %}

{% block title %}
Add Job 
{% endblock %} 

<!-- Page Container -->
{% block content %}
  <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-600">Add New Job</h2>

    <form action="#" method="POST" enctype="multipart/form-data" class="space-y-5">
      <!-- Job Title -->
      <div>
        <label class="block font-medium mb-1">Job Title</label>
        <input type="text" name="job_title" placeholder="Frontend Developer" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Company Name -->
      <div>
        <label class="block font-medium mb-1">Company Name</label>
        <input type="text" name="company_name" placeholder="ABC Company" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Company Logo -->
      <div>
        <label class="block font-medium mb-1">Company Logo</label>
        <input type="file" name="company_logo" class="w-full border rounded-lg px-4 py-2 bg-white" />
      </div>

      <!-- Job Location -->
      <div>
        <label class="block font-medium mb-1">Job Location</label>
        <input type="text" name="job_location" placeholder="Dhaka / Remote" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Vacancy -->
      <div>
        <label class="block font-medium mb-1">Vacancy</label>
        <input type="number" name="vacancy" placeholder="5" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Category -->
      <div>
        <label class="block font-medium mb-1">Category</label>
        <select name="category" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
          <option value="">Select Category</option>
          <option value="IT">IT</option>
          <option value="Marketing">Marketing</option>
          <option value="Design">Design</option>
          <option value="Sales">Sales</option>
        </select>
      </div>

      <!-- Description -->
      <div>
        <label class="block font-medium mb-1">Job Description</label>
        <textarea name="description" rows="4" placeholder="Job details..." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <!-- Salary -->
      <div>
        <label class="block font-medium mb-1">Salary</label>
        <input type="text" name="salary" placeholder="৳40,000 - ৳60,000" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Post Date -->
      <div>
        <label class="block font-medium mb-1">Post Date</label>
        <input type="date" name="post_date" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">Add Job</button>
      </div>
    </form>
  </div>
{% endblock %}

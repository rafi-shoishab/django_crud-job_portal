{% extends 'base.html' %}

{% block title %}
  {{ job.job_title }} - Job Portal
{% endblock %}

<!-- Page Container -->
{% block content %}
  <h1 class="text-3xl font-bold text-center">Add Job</h1>

  <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-600">Add New Job</h2>

    <form class="space-y-5">
      <div>
        <label class="block font-medium mb-1">Job Title</label>
        <input type="text" placeholder="Frontend Developer" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block font-medium mb-1">Company Name</label>
        <input type="text" placeholder="ABC Software Ltd." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block font-medium mb-1">Company Logo</label>
        <input type="file" class="w-full border rounded-lg px-4 py-2 bg-white" />
      </div>

      <div>
        <label class="block font-medium mb-1">Job Location</label>
        <input type="text" placeholder="Dhaka / Remote" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block font-medium mb-1">Job Type</label>
        <select class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
          <option value="">Select Category</option>
          <option value="remote">Remote</option>
          <option value="onsite">On-Site</option>
          <option value="hybrid">Hybrid</option>
        </select>
      </div>

      <div>
        <label class="block font-medium mb-1">Vacancy</label>
        <input type="number" placeholder="5" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block font-medium mb-1">Category</label>
        <select class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
          <option value="">Select Category</option>
          <option value="fulltime">Full Time</option>
          <option value="parttime">Part Time</option>
          <option value="intern">Internship</option>
          <option value="tontract">Contractual</option>
        </select>
      </div>

      <div>
        <label class="block font-medium mb-1">Job Description</label>
        <textarea rows="4" placeholder="Write job responsibilities and requirements..." class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <div>
        <label class="block font-medium mb-1">Salary</label>
        <input type="text" placeholder="৳40,000 - ৳60,000" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block font-medium mb-1">Submission Deadline</label>
        <input type="date" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500" />
      </div>

      <div class="text-center">
        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">Add Job</button>
      </div>
    </form>
  </div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}
  {{ job.job_title }} - Job Portal
{% endblock %}

{% block content %}
<div class="bg-blue-600 text-white py-10 mb-10">
  <h1 class="text-4xl font-bold text-center">Browse All Jobs</h1>
</div>

<div class="max-w-7xl mx-auto px-6 pb-16">
  <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">

    <div class="bg-white p-6 rounded-lg shadow hover:shadow-xl transition">
      <div class="h-16 w-16 mb-4 bg-gray-200 rounded flex items-center justify-center">
        <span class="text-sm text-gray-500">Logo</span>
      </div>

      <h3 class="text-xl font-semibold">Backend Developer</h3>
      <p class="text-gray-600 text-sm">XYZ Tech Ltd.</p>

      <p class="text-gray-500 text-sm mt-1">📍 Remote | Full Time</p>

      <p class="text-gray-700 text-sm mt-2">Vacancy: 2</p>
      <p class="text-gray-700 text-sm">Salary: ৳70,000</p>

      <p class="text-red-500 text-sm mt-2">Deadline: 15 Apr 2026</p>

      <div class="mt-4 flex justify-between items-center">
        <a href="{% url 'single_job_view' %}" class="text-blue-600 font-semibold hover:underline">
          View Details
        </a>
        <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">
          Remote
        </span>
      </div>
    </div>

  </div>
</div>

{% endblock %}

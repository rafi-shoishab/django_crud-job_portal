{% extends 'base.html' %}

{% block title %}
  {{ job.job_title }} - Job Portal
{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold text-center mb-8">All Job Listings</h1>

<div class="max-w-7xl mx-auto bg-white rounded-lg shadow overflow-x-auto">
  <table class="min-w-full border">
    <thead class="bg-gray-100">
      <tr class="text-sm">
        <th class="px-4 py-3 border">#</th>
        <th class="px-4 py-3 border">Title</th>
        <th class="px-4 py-3 border">Company</th>
        <th class="px-4 py-3 border">Location</th>
        <th class="px-4 py-3 border">Type</th>
        <th class="px-4 py-3 border">Vacancy</th>
        <th class="px-4 py-3 border">Salary</th>
        <th class="px-4 py-3 border">Deadline</th>
        <th class="px-4 py-3 border">Action</th>
      </tr>
    </thead>

    <tbody class="text-sm">
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 border">1</td>
        <td class="px-4 py-3 border font-medium">Frontend Developer</td>
        <td class="px-4 py-3 border">ABC Software</td>
        <td class="px-4 py-3 border">Dhaka</td>
        <td class="px-4 py-3 border">
          <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Remote</span>
        </td>
        <td class="px-4 py-3 border text-center">3</td>
        <td class="px-4 py-3 border">৳50,000</td>
        <td class="px-4 py-3 border">30 Mar 2026</td>
        <td class="px-4 py-3 border text-center space-x-2">
          <button class="bg-blue-500 text-white px-3 py-1 rounded text-xs">View</button>
          <button class="bg-yellow-500 text-white px-3 py-1 rounded text-xs">Edit</button>
          <button class="bg-red-500 text-white px-3 py-1 rounded text-xs">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

{% endblock %}

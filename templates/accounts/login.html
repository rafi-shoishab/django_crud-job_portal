{% extends 'base.html' %}

{% block title %}
  login
{% endblock %}

{% block content %}
  <div class="flex justify-center m-8">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">Login</h2>

      <form method="POST">
        {% csrf_token %} <!-- for security -->
        <!-- Email Username -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Email or username</label>
          <input type="text" name="email_username" placeholder="Enter your user name or email" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-gray-700 mb-2">Password</label>
          <input type="password" name="password" placeholder="Enter password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Button -->
        <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Login</button>
      </form>

      <p class="text-center text-sm mt-6">
        Don't have an account?
        <a href=" {% url 'register' %}" class="text-blue-600 hover:underline">Register</a>
      </p>
    </div>
  </div>
{% endblock %}
